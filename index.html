<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My World Wide Trip</title>

<script src="https://unpkg.com/globe.gl"></script>

<style>
:root{
  --bg:#070b14;
  --card:#111a2e;
  --accent:#4cc9f0;
  --text:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

.sidebar{
  width:340px;
  background:var(--card);
  padding:14px;
  overflow:auto;
}

.logo{
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

input,textarea,button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{background:var(--accent);font-weight:bold;cursor:pointer}

.card{
  background:#0c1528;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

#globe{
  flex:1;
}

@media(max-width:900px){
  body{flex-direction:column}
  .sidebar{width:100%;height:45vh}
  #globe{height:55vh}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LOGO (logo.png)</div>

  <h2>🌍 Travel App</h2>

  <input id="search" placeholder="Land suchen (z.B. Germany)" oninput="filterCountries()" />
  <div id="countryList"></div>

  <hr />

  <h3>Reise hinzufügen</h3>
  <input id="city" placeholder="Stadt" />
  <input id="date" type="date" />
  <textarea id="note" placeholder="Notiz"></textarea>
  <button onclick="addTrip()">Speichern</button>

  <h3>Statistik</h3>
  <div id="stats"></div>

  <h3>Reisen</h3>
  <div id="list"></div>
</div>

<div id="globe"></div>

<script>

let trips = JSON.parse(localStorage.getItem("trips")||"[]");
let countriesData = [];
let selectedCountry = null;

function save(){
  localStorage.setItem("trips",JSON.stringify(trips));
}

// ===== LOAD COUNTRIES =====
fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(r=>r.json())
.then(data=>{
  countriesData = data.features;
  initGlobe();
  renderCountries();
});

// ===== GLOBE =====
let world;

function initGlobe(){

world = Globe()
(document.getElementById('globe'))
.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
.backgroundColor('#070b14')
.polygonsData(countriesData)
.polygonCapColor(()=>'rgba(80,150,255,0.15)')
.polygonStrokeColor(()=>'#4cc9f0')
.onPolygonClick(d=>{
  selectedCountry = d.properties.name;
  alert("Ausgewählt: " + selectedCountry);
});

updatePoints();

}

// ===== POINTS =====
function updatePoints(){
world.pointsData(trips)
.pointLat(d=>d.lat)
.pointLng(d=>d.lng)
.pointColor(()=>"red")
.pointRadius(0.4)
.pointAltitude(0.02)
.pointLabel(d=>d.city);
}

// ===== ADD TRIP =====
function addTrip(){
  if(!selectedCountry) return alert("Bitte Land auswählen!");

  let t = {
    country:selectedCountry,
    city:city.value,
    date:date.value,
    note:note.value,
    lat:0,
    lng:0
  };

  trips.push(t);
  save();
  render();
  updatePoints();
  updateStats();
}

// ===== LIST =====
function render(){
list.innerHTML = trips.map(t=>
`<div class='card'><b>${t.country}</b><br>${t.city}<br>${t.date}<br>${t.note}</div>`
).join('');
}

// ===== STATS =====
function updateStats(){
  let countries = new Set(trips.map(t=>t.country)).size;
  stats.innerHTML = `Länder besucht: ${countries}<br>Städte: ${trips.length}`;
}

// ===== SEARCH =====
function renderCountries(){
countryList.innerHTML = countriesData.slice(0,20).map(c=>
`<div onclick="selectCountry('${c.properties.name}')">🌍 ${c.properties.name}</div>`
).join('');
}

function filterCountries(){
let val = search.value.toLowerCase();
countryList.innerHTML = countriesData
.filter(c=>c.properties.name.toLowerCase().includes(val))
.slice(0,20)
.map(c=>`<div onclick="selectCountry('${c.properties.name}')">🌍 ${c.properties.name}</div>`)
.join('');
}

function selectCountry(c){
selectedCountry=c;
alert("Ausgewählt: "+c);
}

render();
updateStats();

</script>

</body>
</html>
