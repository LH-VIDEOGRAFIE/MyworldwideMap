<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Globe Pro</title>

<link rel="stylesheet" href="style.css"/>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="burger" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">



<div class="app">

  <div class="sidebar" id="sidebar">

    <h1>🌍 Travel Tracker Pro</h1>

    <div class="form">
      <input id="countryInput" placeholder="Land (z. B. Australia)" />
      <input id="cityInput" placeholder="Stadt (z. B. Sydney)" />

      <select id="rating">
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="2">⭐⭐</option>
        <option value="1">⭐</option>
      </select>

      <button onclick="addTravel()">➕ Hinzufügen</button>
  
    </div>

    <div class="stats">
      <p id="countryCount"></p>
      <p id="cityCount"></p>
    </div>

    <div id="countryList"></div>
    <div id="cityList"></div>

    <div id="ratingStats"></div>

  </div>

  <div id="globeViz"></div>

</div>

<script src="app.js"></script>
</body>
</html>
