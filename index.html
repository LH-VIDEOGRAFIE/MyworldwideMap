<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My World Wide Trip – FINAL UPGRADE</title>

<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f4f7ff;
  --panel:#ffffff;
  --accent:#2563eb;
  --accent2:#7c3aed;
  --soft:#eef2ff;
  --text:#0f172a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#f4f7ff,#eef2ff);
  color:var(--text);
  overflow:auto;
}

/* TOP BAR */
.topnav{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  background:var(--panel);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:3000;
  border-bottom:1px solid #e5e7eb;
}

.logo{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  padding:6px 12px;
  border-radius:10px;
  font-weight:bold;
}

.burger{display:none;font-size:26px;cursor:pointer}

.nav button{
  background:transparent;
  border:1px solid #d1d5db;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.container{
  display:flex;
  margin-top:60px;
  height:calc(100vh - 60px);
}

.sidebar{
  width:380px;
  background:var(--panel);
  padding:12px;
  overflow-y:auto;
  border-right:1px solid #e5e7eb;
}

#globe{flex:1}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

button.action{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:var(--soft);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.flag{
  width:70px;
  margin:4px;
  border-radius:10px;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

.badge{
  display:inline-block;
  padding:6px 10px;
  background:#dbeafe;
  border-radius:8px;
  margin:3px;
  font-size:12px;
}

@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%;height:45vh}
  #globe{height:55vh}
  .burger{display:block}
  .nav{display:none}
}

canvas{max-width:100%}

</style>
</head>

<body>

<div class="topnav">
  <div class="logo">🌍 WORLD TRIP</div>
  <div class="burger" onclick="toggle()">☰</div>
  <div class="nav">
    <button onclick="view('map')">Map</button>
    <button onclick="view('stats')">Stats</button>
    <button onclick="exportPoster()">Export Poster</button>
  </div>
</div>

<div class="container">

<div class="sidebar">

<h2>Reise Planer</h2>

<input id="countryInput" placeholder="Land auswählen" />
<input id="city" placeholder="Stadt" />
<input id="date" type="date" />
<textarea id="note" placeholder="Notizen / Diary"></textarea>
<button class="action" onclick="addTrip()">Speichern</button>

<h3>Reisen</h3>
<div id="list"></div>

<h3>Flaggen</h3>
<div id="flags"></div>

<h3>Statistik</h3>
<div id="stats"></div>

<canvas id="chart" height="180"></canvas>

</div>

<div id="globe"></div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("trips")||"[]");
let globe;
let countries=[];

function save(){localStorage.setItem("trips",JSON.stringify(trips));}

fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(r=>r.json())
.then(d=>{countries=d.features;init();render();});

function init(){
globe=Globe()(document.getElementById('globe'))
.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
.backgroundColor('#f4f7ff')
.polygonsData(countries)
.polygonCapColor(()=>"rgba(37,99,235,0.15)")
.polygonStrokeColor(()=>"#2563eb");
updatePoints();
}

function updatePoints(){
globe.pointsData(trips)
.pointLat(d=>d.lat)
.pointLng(d=>d.lng)
.pointColor(()=>"#ef4444")
.pointRadius(0.5);
}

async function geo(city){
let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
let d=await r.json();
return d[0]?{lat:+d[0].lat,lng:+d[0].lon}:{lat:0,lng:0};
}

function daysLeft(date){return Math.ceil((new Date(date)-new Date())/86400000)}

async function addTrip(){
let c=await geo(city.value+","+countryInput.value);
trips.push({country:countryInput.value,city:city.value,date:date.value,note:note.value,lat:c.lat,lng:c.lng,days:daysLeft(date.value)});
save();render();updatePoints();stats();drawChart();renderFlags();
}

function render(){
list.innerHTML=trips.map(t=>`
<div class='card'>
<b>${t.country}</b><br>
${t.city}<br>
📅 ${t.date} (${t.days} Tage)
<br>${t.note}
</div>`).join('');
}

function renderFlags(){
flags.innerHTML="";
trips.forEach(t=>{
fetch(`https://restcountries.com/v3.1/name/${t.country}`)
.then(r=>r.json())
.then(d=>{
let f=d[0]?.flags?.png;
if(f){
let img=document.createElement('img');
img.src=f;
img.className='flag';
flags.appendChild(img);
}
});
});
}

function stats(){
let countries=new Set(trips.map(t=>t.country)).size;
stats.innerHTML=`
<div class='badge'>🌍 Länder: ${countries}</div>
<div class='badge'>🏙️ Städte: ${trips.length}</div>
<div class='badge'>📊 Welt: ${((countries/195)*100).toFixed(1)}%</div>
<div class='badge'>🧭 Letzte: ${trips.at(-1)?.city||"-"}</div>
`;
}

function drawChart(){
let ctx=document.getElementById('chart');
new Chart(ctx,{type:'pie',data:{labels:['Reisen'],datasets:[{data:[trips.length],backgroundColor:['#2563eb']}]}});
}

function exportPoster(){
html2canvas(document.body).then(canvas=>{
let a=document.createElement('a');
a.download="world-poster.png";
a.href=canvas.toDataURL();
a.click();
});
}

function render(){renderFlags();stats();drawChart();}

function view(v){alert(v)}

function toggle(){document.querySelector('.sidebar').classList.toggle('hidden')}

</script>

</body>
</html>
