<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Tracker Globe</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Globe.gl + Three.js -->
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h1>🌍 Travel Tracker</h1>

      <div class="form">
        <input id="countryInput" placeholder="Land (z. B. Australien)" />
        <input id="cityInput" placeholder="Stadt (z. B. Sydney)" />
        <input id="latInput" placeholder="Breitengrad (z. B. -33.86)" />
        <input id="lngInput" placeholder="Längengrad (z. B. 151.21)" />

        <select id="rating">
          <option value="5">⭐⭐⭐⭐⭐</option>
          <option value="4">⭐⭐⭐⭐</option>
          <option value="3">⭐⭐⭐</option>
          <option value="2">⭐⭐</option>
          <option value="1">⭐</option>
        </select>

        <button onclick="addTravel()">Speichern</button>
      </div>

      <div class="stats">
        <h2>📊 Statistik</h2>
        <p id="countryCount">Länder: 0 / 195</p>
        <p id="cityCount">Städte: 0</p>
      </div>

      <canvas id="pieChart"></canvas>
      <canvas id="barChart"></canvas>
    </div>

    <!-- GLOBE -->
    <div id="globeViz"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
