<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Globe Core</title>

<script src="https://unpkg.com/three@0.156.1/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.30.1/dist/globe.gl.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0b1220;
}

#globe{
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<div id="globe"></div>

<script>

/* =========================
   STATE (Reise-Daten)
========================= */

let visited = new Set();

/* =========================
   GLOBE INIT (CORE)
========================= */

const globe = Globe()
(document.getElementById('globe'))
.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
.showAtmosphere(true)
.atmosphereColor('lightskyblue')
.atmosphereAltitude(0.25);

/* =========================
   LOAD COUNTRIES (REAL GEOJSON)
========================= */

fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
.then(res => res.json())
.then(world => {

globe
.polygonsData(world.features)
.polygonAltitude(0.01)
.polygonCapColor(d => {
return visited.has(d.properties.name)
? 'rgba(0,200,120,0.6)'   // visited = grün
: 'rgba(255,255,255,0.05)'; // default
})
.polygonStrokeColor(() => '#1e3a8a')
.polygonSideColor(() => 'rgba(0,0,0,0.05)')

/* CLICK EVENT */
.onPolygonClick(d => {
const country = d.properties.name;

visited.add(country);

console.log("Visited:", country);

/* UPDATE COLORS */
globe.polygonsData(world.features);
});
});

/* =========================
   CAMERA START POSITION
========================= */

globe.pointOfView({
lat: 20,
lng: 0,
altitude: 2.5
}, 0);

</script>

</body>
</html>
