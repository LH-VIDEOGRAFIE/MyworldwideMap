<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Globe FULL STARTUP</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Globe -->
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<button class="login-btn" onclick="login()">🔐 Login</button>

<div class="app">

  <div class="sidebar" id="sidebar">

    <h1>🌍 Travel Globe SaaS</h1>

    <div id="userInfo"></div>

    <div class="form">

      <input id="countryInput" placeholder="Land (oder Globus klicken)" />
      <input id="cityInput" placeholder="Stadt (optional)" />
      <input id="photoInput" placeholder="Foto URL (optional)" />

      <select id="rating">
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="2">⭐⭐</option>
        <option value="1">⭐</option>
      </select>

      <button onclick="addTravel()">➕ Speichern</button>

    </div>

    <div class="stats">
      <h3>📊 Stats</h3>
      <p id="countryCount"></p>
      <p id="cityCount"></p>
    </div>

    <div id="leaderboard"></div>

    <div id="timeline"></div>

    <canvas id="pieChart"></canvas>

  </div>

  <div id="globeViz"></div>

</div>

<script src="app.js"></script>
</body>
</html>
