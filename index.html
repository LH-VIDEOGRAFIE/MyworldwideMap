<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My World Wide Trip – FINAL FIXED APP</title>

<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f4f7ff;
  --panel:#ffffff;
  --accent:#2563eb;
  --accent2:#7c3aed;
  --soft:#eef2ff;
  --text:#0f172a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#f4f7ff,#eef2ff);
  color:var(--text);
  overflow:auto;
}

.topnav{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  background:var(--panel);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:3000;
  border-bottom:1px solid #e5e7eb;
}

.logo{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  padding:6px 12px;
  border-radius:10px;
  font-weight:bold;
}

.nav button{
  margin-left:6px;
  border:1px solid #d1d5db;
  background:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.container{
  display:flex;
  margin-top:60px;
  height:calc(100vh - 60px);
}

.sidebar{
  width:360px;
  background:var(--panel);
  padding:12px;
  overflow:auto;
  border-right:1px solid #e5e7eb;
}

#globe{
  flex:1;
}

.view{display:none}
.view.active{display:block}

input,textarea{
  width:100%;padding:10px;margin-top:6px;border-radius:10px;border:1px solid #e5e7eb;
}

button.action{
  width:100%;margin-top:8px;padding:10px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;font-weight:bold;
}

.card{background:var(--soft);padding:10px;margin-top:10px;border-radius:10px}

.flag{width:70px;border-radius:8px;margin:4px;animation:float 3s infinite}
@keyframes float{50%{transform:translateY(-5px)}}

.badge{background:#dbeafe;padding:6px 10px;border-radius:8px;margin:3px;display:inline-block;font-size:12px}

/* visited countries highlight */
.visited{fill:rgba(37,99,235,0.35)!important}

@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%;height:45vh}
}

</style>
</head>
<body>

<div class="topnav">
  <div class="logo">🌍 TRAVEL OS</div>
  <div class="nav">
    <button onclick="switchView('map')">Map</button>
    <button onclick="switchView('planner')">Planung</button>
    <button onclick="switchView('stats')">Statistik</button>
    <button onclick="exportPoster()">Export</button>
  </div>
</div>

<div class="container">

<div class="sidebar">

<!-- MAP VIEW -->
<div id="map" class="view active">
  <h3>🌍 Weltkarte</h3>
  <p>Klicke ein Land → wird als besucht markiert</p>
</div>

<!-- PLANNER -->
<div id="planner" class="view">
  <h3>✈️ Reise planen</h3>
  <input id="countryInput" placeholder="Land" />
  <input id="city" placeholder="Stadt" />
  <input id="date" type="date" />
  <textarea id="note" placeholder="Notizen"></textarea>
  <button class="action" onclick="addTrip()">Speichern</button>
</div>

<!-- STATS -->
<div id="statsView" class="view">
  <h3>📊 Statistik</h3>
  <div id="stats"></div>
  <canvas id="chart"></canvas>
</div>

<h3>Reisen</h3>
<div id="list"></div>

<h3>Flaggen</h3>
<div id="flags"></div>

</div>

<div id="globe"></div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("trips")||"[]");
let visited=new Set(trips.map(t=>t.country));
let globe;
let countries=[];

function save(){localStorage.setItem("trips",JSON.stringify(trips));}

fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(r=>r.json())
.then(d=>{countries=d.features;init();render();});

function init(){

globe=Globe()(document.getElementById('globe'))
.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
.backgroundColor('#f4f7ff')
.polygonsData(countries)
.polygonCapColor(d=>visited.has(d.properties.name)?'rgba(37,99,235,0.45)':'rgba(0,0,0,0.05)')
.polygonStrokeColor(()=>"#2563eb")
.onPolygonClick(d=>{
  visited.add(d.properties.name);
  render();
  updateGlobe();
});

updateGlobe();
}

function updateGlobe(){
globe.polygonsData(countries);
}

async function geo(city){
let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
let d=await r.json();
return d[0]?{lat:+d[0].lat,lng:+d[0].lon}:{lat:0,lng:0};
}

function daysLeft(date){return Math.ceil((new Date(date)-new Date())/86400000)}

async function addTrip(){
let c=await geo(city.value+","+countryInput.value);
trips.push({country:countryInput.value,city:city.value,date:date.value,note:note.value,lat:c.lat,lng:c.lng,days:daysLeft(date.value)});
visited.add(countryInput.value);
save();render();stats();drawChart();renderFlags();updateGlobe();
}

function render(){
list.innerHTML=trips.map(t=>`
<div class='card'><b>${t.country}</b><br>${t.city}<br>📅 ${t.date}</div>`).join('');
}

function renderFlags(){
flags.innerHTML="";
trips.forEach(t=>{
fetch(`https://restcountries.com/v3.1/name/${t.country}`)
.then(r=>r.json())
.then(d=>{
let f=d[0]?.flags?.png;
if(f){let img=document.createElement('img');img.src=f;img.className='flag';flags.appendChild(img);}
});
});
}

function stats(){
let c=visited.size;
stats.innerHTML=`
<div class='badge'>Länder: ${c}</div>
<div class='badge'>Städte: ${trips.length}</div>
<div class='badge'>Welt: ${((c/195)*100).toFixed(1)}%</div>`;
}

function drawChart(){
new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{labels:['Besucht','Rest'],datasets:[{data:[visited.size,195-visited.size],backgroundColor:['#2563eb','#e5e7eb']}]}
});
}

function switchView(v){
document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
if(v==='map')map.classList.add('active');
if(v==='planner')planner.classList.add('active');
if(v==='stats')statsView.classList.add('active');
}

function exportPoster(){
html2canvas(document.body).then(c=>{
let a=document.createElement('a');
a.download="travel-poster.png";
a.href=c.toDataURL();
a.click();
});
}

</script>

</body>
</html>
